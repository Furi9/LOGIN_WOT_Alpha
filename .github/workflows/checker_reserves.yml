name: WoT Reserve Checker

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  check:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore reserve state
        uses: actions/cache@v4
        with:
          path: reserve_state.json
          key: reserve-state-${{ github.run_id }}
          restore-keys: |
            reserve-state-

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Check reserves
        env:
          WG_APP_ID: ${{ secrets.WG_APP_ID }}
          WG_TOKEN: ${{ secrets.WG_TOKEN }}
          CLAN_ID: ${{ secrets.CLAN_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          python reserve_checker.py

      - name: Save reserve state
        uses: actions/cache@v4
        with:
          path: reserve_state.json
          key: reserve-state-${{ github.run_id }}