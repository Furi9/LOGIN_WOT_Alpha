name: WoT Reserve Checker

on:
  schedule:
    - cron: "0,10,20,30,40,50 15-22 * * *"
    - cron: "0 23 * * *"

  workflow_dispatch:

jobs:
  check:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Check reserves
        env:
          WG_APP_ID: ${{ secrets.WG_APP_ID }}
          WG_TOKEN: ${{ secrets.WG_TOKEN }}
          CLAN_ID: ${{ secrets.CLAN_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          python reserve_checker.py

      - name: Save reserve state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add reserve_state.json

          git commit -m "Update reserve state" || true

          git push